data_dir: data
data_cleanup_enabled: true
data_retention_hours: 24
data_cleanup_interval_seconds: 300

sources:
  enabled_assets:
    - BTC
    - ETH
  # Windows system proxy is tried first; this explicit proxy is the fallback.
  proxy_url: http://127.0.0.1:10808
  market_slug: btc-updown-5m-1783704300
  binance_symbol: BTCUSDT
  binance_rest_url: https://api.binance.com
  binance_ws_url: wss://stream.binance.com:9443/ws/btcusdt@trade
  gamma_url: https://gamma-api.polymarket.com
  clob_url: https://clob.polymarket.com
  clob_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  rtds_ws_url: wss://ws-live-data.polymarket.com
  rtds_stale_seconds: 10
  threshold_page_timeout_seconds: 4
  threshold_page_retry_seconds: 2
  poly_book_poll_ms: 200
  market_refresh_seconds: 0.5
  max_start_price_lag_ms: 2000
  market_slug_patterns:
    - bitcoin
    - btc
    - up-or-down
    - updown
  observe_only_on_unverified_settlement: true

strategy:
  min_entry_edge_usd: 10
  stop_edge_usd: 10
  min_buy_price: 0.10
  max_buy_price: 0.75
  take_profit_ticks: 0.10
  min_profit_after_slippage: 0.04
  min_seconds_to_entry: 10
  max_seconds_to_entry: 240
  force_exit_seconds: 5
  book_direction_exit_delay_seconds: 10
  reverse_entry_enabled: false
  entry_confirmation_enabled: true
  entry_confirmation_seconds: 1
  entry_confirmation_updates: 3
  taker_fee_rate: 0.07

risk:
  max_order_usd: 10
  max_market_usd: 30
  max_data_age_ms: 1000
  max_hold_seconds: 120
  max_loss_usd: 2.5
  max_trades_per_market: 1

pair_match:
  enabled: false
  # Total quote target is 2x this value; both legs receive exactly the same shares.
  leg_quote_usd: 10
  min_spread_cents: 0
  # Used only for the second order in per_market_two_stage mode.
  second_order_min_spread_cents: 0
  # Absolute difference between the two simulated execution averages.
  min_leg_price_gap_cents: 0
  start_seconds_after_open: 20
  end_seconds_after_open: 280
  max_pairs_per_market: 1
  alternate_directions: true
  # per_market: best first; per_market_two_stage: best first, then opposite with its own spread.
  # per_market_two_stage always forces strict alternation and max_pairs_per_market=2.
  # per_market_ab/per_market_ba: fixed first direction, then alternate.
  # Sequence modes default max_pairs_per_market to 2 when that field is omitted.
  # continuous_abab: alternate forever; always_a/always_b: fixed direction.
  alternation_mode: per_market

btc_recovery:
  enabled: false
  # All prices are cents. Once recovery triggers, the reverse quantity buys at the live book.
  entry_price_cents: 70
  target_price_cents: 80
  recovery_trigger_cents: 40
  stop_price_cents: 30
  initial_quantity: 5
  recovery_quantity: 15
  # The strategy observes entries only inside [entry, exit).
  entry_seconds_after_open: 0
  exit_seconds_after_open: 300
